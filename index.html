<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/images/logo-mark.png" />
    <title>Crest Range Properties — Abu Dhabi Private Brokerage</title>
    <meta
      name="description"
      content="Crest Range Properties is a boutique Abu Dhabi brokerage covering sales, leasing and property management across Saadiyat, Yas, Al Reem, Al Raha Beach and the Corniche."
    />

    <!-- Open Graph / social link preview. Static in the document head because
         social crawlers (WhatsApp, Facebook, LinkedIn) do not run the SPA's JS,
         so PageHead's client-side meta never reaches them. Absolute image URL
         is required. og-cover.jpg is a 1200x630 branded homepage-hero card. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crest Range Properties" />
    <meta property="og:title" content="Crest Range Properties — Abu Dhabi Private Brokerage" />
    <meta
      property="og:description"
      content="Finding Home Away from Home. A boutique Abu Dhabi brokerage for sales, leasing and property management across Saadiyat, Yas, Al Reem, Al Raha Beach and the Corniche."
    />
    <meta property="og:url" content="https://demo-crestrange.jolagconsulting.com/" />
    <meta property="og:image" content="https://demo-crestrange.jolagconsulting.com/images/og-cover.jpg" />
    <meta property="og:image:secure_url" content="https://demo-crestrange.jolagconsulting.com/images/og-cover.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Crest Range Properties — Abu Dhabi skyline with the headline Finding Home Away from Home" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crest Range Properties — Abu Dhabi Private Brokerage" />
    <meta
      name="twitter:description"
      content="Finding Home Away from Home. A boutique Abu Dhabi brokerage for sales, leasing and property management."
    />
    <meta name="twitter:image" content="https://demo-crestrange.jolagconsulting.com/images/og-cover.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Marcellus&family=Archivo:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
